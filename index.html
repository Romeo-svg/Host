<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding RSVP</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="icon-container">
        <img src="Groom.png" alt="Wedding Icon">
    </div>

    <h1>Your seat is well preserved</h1>

    <form id="rsvpForm" class="form-group">
        <input type="text" id="guestName" placeholder="Enter your full name" required>
        <input type="email" id="guestEmail" placeholder="Enter your email" required>
        <button type="submit">I'LL ATTEND 😊</button>
    </form>

    <div id="statusMessage"></div>

</div>

<script src="script.js"></script>

</body>
</html>
